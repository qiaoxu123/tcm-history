name: 构建文档站（网页 + PDF）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # weasyprint（PDF 导出）所需系统库
      - name: 安装 PDF 依赖系统库
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 构建网页 + PDF
        env:
          ENABLE_PDF: "1"
        run: mkdocs build

      # 私有 + 免费套餐不支持 GitHub Pages，故上传为可下载的构建产物
      - name: 上传网站静态产物
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: site

      - name: 上传整书 PDF
        uses: actions/upload-artifact@v4
        with:
          name: tcm-history-pdf
          path: site/pdf/*.pdf

  # 若日后升级 GitHub Pro 或将仓库转为 public，可启用以下 Pages 部署：
