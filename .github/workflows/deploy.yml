name: 构建并部署文档站（网页 + PDF）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # weasyprint（PDF 导出）所需系统库
      - name: 安装 PDF 依赖系统库
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 构建网页 + PDF
        env:
          ENABLE_PDF: "1"
        run: mkdocs build

      - name: 上传整书 PDF（可下载产物）
        uses: actions/upload-artifact@v4
        with:
          name: tcm-history-pdf
          path: site/pdf/*.pdf

      - name: 上传 Pages 部署包
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # 部署到 GitHub Pages（仅在推送到 main / 手动触发时执行）
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
